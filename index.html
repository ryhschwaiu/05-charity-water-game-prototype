<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open the Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="game-page">
        <header class="top-bar">
            <h1>Open the Flow</h1>
            <div class="score-board">
                <span>People Served: <strong id="scoreValue">0</strong></span>
                <span>High Score: <strong id="highScoreValue">0</strong></span>
            </div>
        </header>

        <section class="game-frame">
            <canvas id="gameCanvas" width="360" height="720" aria-label="Open the Flow game area"></canvas>

            <div id="startOverlay" class="overlay show">
                <div class="overlay-card">
                    <h2>Open the Flow</h2>
                    <p>Use arrow keys to move and Space to interact.</p>
                    <ul>
                        <li>Stay ahead of the rising water.</li>
                        <li>Open hatches and remove threats.</li>
                        <li>Clear rows to serve more people.</li>
                    </ul>
                    <button id="startButton" type="button">Start Game</button>
                </div>
            </div>

            <div id="gameOverOverlay" class="overlay">
                <div class="overlay-card">
                    <h2>Game Over</h2>
                    <p id="gameOverMessage">The water caught you.</p>
                    <p>People Served: <strong id="finalScoreValue">0</strong></p>
                    <button id="restartButton" type="button">Restart</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
